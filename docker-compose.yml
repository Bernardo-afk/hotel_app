version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stay
      POSTGRES_PASSWORD: stay
      POSTGRES_DB: stay_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stay
      POSTGRES_PASSWORD: stay
      POSTGRES_DB: stay_test
    ports:
      - '5433:5432'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
